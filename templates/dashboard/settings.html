{% extends 'dashboard/base_receptionist.html' %}

{% block title %}Configurações - OX4 Gestão{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2>Configurações do Sistema</h2>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card card-custom p-4">
            <h4><i class="fas fa-lock me-2"></i>Segurança</h4>
            <p class="text-muted">Alterar senha e permissões.</p>
            <button class="btn btn-outline-primary">Alterar Senha</button>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card card-custom p-4">
            <h4><i class="fas fa-bell me-2"></i>Notificações</h4>
            <p class="text-muted">Configurar alertas de email.</p>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="flexSwitchCheckChecked" checked>
                <label class="form-check-label" for="flexSwitchCheckChecked">Receber emails de novas marcações</label>
            </div>
        </div>
    </div>
</div>
{% endblock %}
