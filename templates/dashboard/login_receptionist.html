<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Gestão - OX4 Nails</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 48px;
            color: #0d6efd;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 24px;
            color: #333;
            font-weight: 600;
        }

        .form-control {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            background-color: #0d6efd;
            border: none;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6c757d;
        }

        .footer-link a {
            color: #0d6efd;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-spa"></i>
            <h1>OX4 Gestão</h1>
            <p class="text-muted">Acesso Administrativo</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger text-center p-2 mb-3">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                    {{ form.username }}
                </div>
            </div>

            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    {{ form.password }}
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Entrar no Sistema</button>
        </form>

        <div class="footer-link">
            <a href="{% url 'home' %}">Voltar ao site público</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script to add classes to django form fields dynamically -->
    <script>
        document.querySelectorAll('input').forEach(input => {
            input.classList.add('form-control');
            input.classList.add('border-start-0'); // Remove left border to merge with icon
        });
    </script>
</body>

</html>
